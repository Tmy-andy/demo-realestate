<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales — Aurora Heights Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-name">Aurora Heights</div>
    <div class="brand-sub">Sales · Bất Động Sản</div>
  </div>
  <div class="nav-list">
    <div class="sidebar-section-label" style="padding:10px 8px 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.12em">Công Việc</div>
    <div class="nav-item" data-p="dashboard">  <span class="ni-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span><span class="ni-label">Dashboard</span></div>
    <div class="nav-item" data-p="leads">      <span class="ni-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg></span><span class="ni-label">Leads & Booking</span></div>
    <div class="nav-item" data-p="calendar">   <span class="ni-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg></span><span class="ni-label">Lịch Hẹn</span></div>

    <div class="nav-divider"></div>
    <div class="sidebar-section-label" style="padding:6px 8px 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.12em">Dự Án</div>
    <div class="nav-item" data-p="units">      <span class="ni-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span class="ni-label">Tình Trạng Căn Hộ</span></div>
    <div class="nav-item" data-p="vr">         <span class="ni-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect width="15" height="14" x="1" y="5" rx="2"/></svg></span><span class="ni-label">Tour VR360</span></div>
  </div>
  <div class="sidebar-footer">
    <span class="status-dot"></span>Hệ thống hoạt động bình thường
  </div>
</div>

<!-- ===== TOPBAR ===== -->
<div id="topbar">
  <div class="tb-title">Aurora Heights <span class="tb-sub">Sales Dashboard</span></div>
  <div class="topbar-actions">
    <div class="tb-icon-btn" title="Thông báo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg><div class="notif-dot"></div></div>
    <div class="user-pill">
      <div class="avatar" style="background:linear-gradient(135deg,#10b981,#059669)">SL</div>
      <div>
        <div class="user-name">Sales Agent</div>
        <div class="user-role">Bất Động Sản</div>
      </div>
    </div>
    <a href="index.html" class="btn-logout" style="text-decoration:none;display:flex;align-items:center;gap:5px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> Đổi vai trò</a>
  </div>
</div>

<!-- ===== MAIN PAGES ===== -->
<div id="main">
  <div class="page" id="p-dashboard"></div>
  <div class="page" id="p-leads"></div>
  <div class="page" id="p-calendar"></div>
  <div class="page" id="p-units"></div>
  <div class="page" id="p-vr"></div>
</div>

<!-- ===== SLIDE PANEL ===== -->
<div class="panel-backdrop" id="sp-backdrop"></div>
<div class="slide-panel" id="sp">
  <div class="sp-header">
    <div class="sp-title" id="sp-title">Panel</div>
    <button class="sp-close" onclick="closePanel()">×</button>
  </div>
  <div class="sp-body" id="sp-body"></div>
  <div class="sp-footer">
    <button class="btn btn-secondary" onclick="closePanel()">Huỷ</button>
    <button class="btn btn-primary" id="sp-save"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;flex-shrink:0"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Lưu</button>
  </div>
</div>

<!-- ===== CONFIRM MODAL ===== -->
<div class="modal-backdrop" id="cm-back">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="cm-title">Xác nhận</div>
      <div class="modal-sub"   id="cm-sub"></div>
    </div>
    <div class="modal-body">Hành động này không thể hoàn tác. Bạn có chắc chắn?</div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeConfirm()">Huỷ bỏ</button>
      <button class="btn btn-danger" id="cm-ok">Xác Nhận</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div id="toast-wrap"></div>

<script src="js/sales.js"></script>
</body>
</html>
