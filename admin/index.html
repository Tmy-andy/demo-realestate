<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập — Vinhomes Hai Van Bay Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Background grid pattern */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      box-shadow: 0 8px 24px rgba(99,102,241,.35);
    }
    .brand-logo svg { color: #fff; }
    .brand-name {
      font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -.4px;
    }
    .brand-sub {
      font-size: 12px; color: rgba(255,255,255,.35); margin-top: 3px;
    }

    /* Card */
    .login-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      padding: 32px;
      backdrop-filter: blur(24px);
    }
    .card-title {
      font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px;
    }
    .card-sub {
      font-size: 13px; color: rgba(255,255,255,.4); margin-bottom: 28px;
    }

    /* Form */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px; font-weight: 600; color: rgba(255,255,255,.5);
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 7px;
    }
    .input-wrap { position: relative; }
    .input-wrap svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,.25); pointer-events: none;
    }
    .field input {
      width: 100%;
      height: 44px;
      padding: 0 14px 0 40px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color .18s, background .18s;
    }
    .field input::placeholder { color: rgba(255,255,255,.2); }
    .field input:focus {
      border-color: #3b82f6;
      background: rgba(59,130,246,.08);
    }

    /* Password toggle */
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: rgba(255,255,255,.25);
      cursor: pointer; padding: 4px; display: flex; align-items: center;
      transition: color .15s;
    }
    .pw-toggle:hover { color: rgba(255,255,255,.6); }

    /* Error */
    .login-error {
      display: none;
      padding: 10px 14px;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px;
      font-size: 13px; color: #f87171;
      margin-bottom: 16px;
      align-items: center; gap: 8px;
    }
    .login-error.show { display: flex; }

    /* Submit button */
    .btn-login {
      width: 100%; height: 46px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border: none; border-radius: 10px;
      color: #fff; font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .18s, transform .1s;
      margin-top: 4px;
    }
    .btn-login:hover { opacity: .92; }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }

    /* Hint */
    .login-hint {
      margin-top: 24px;
      padding: 14px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px;
    }
    .hint-title {
      font-size: 10px; font-weight: 700; color: rgba(255,255,255,.25);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px;
    }
    .hint-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
      font-size: 12px; color: rgba(255,255,255,.35);
    }
    .hint-row:last-child { border-bottom: none; padding-bottom: 0; }
    .hint-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 8px; border-radius: 20px;
      font-size: 10px; font-weight: 600; letter-spacing: .04em; flex-shrink: 0;
    }
    .hint-badge.owner { background: rgba(99,102,241,.2); color: #818cf8; }
    .hint-badge.sales  { background: rgba(16,185,129,.2); color: #34d399; }
    .hint-cred { font-family: monospace; color: rgba(255,255,255,.5); }

    .footer { text-align: center; margin-top: 24px; font-size: 11px; color: rgba(255,255,255,.15); }

    /* Mobile */
    @media (max-width: 480px) {
      body { padding: 16px; align-items: flex-start; padding-top: 32px; }
      .brand { margin-bottom: 24px; }
      .brand-logo { width: 46px; height: 46px; }
      .brand-name { font-size: 20px; }
      .login-card { padding: 22px 18px; border-radius: 16px; }
      .card-sub { margin-bottom: 22px; }
      .field input { height: 46px; font-size: 16px; /* prevents iOS zoom on focus */ }
      .btn-login { height: 48px; }
      .login-hint { padding: 12px; margin-top: 20px; }
      .hint-cred { font-size: 11px; }
      .footer { margin-top: 18px; }
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <img src="../img/logo/LOGO-LV (2).png" alt="Vinhomes Hai Van Bay" style="height:72px;width:auto;margin:0 auto 14px;display:block">
    <div class="brand-name">Vinhomes Hai Van Bay</div>
    <div class="brand-sub">Hệ thống quản lý nội bộ</div>
  </div>

  <div class="login-card">
    <div class="card-title">Đăng nhập</div>
    <div class="card-sub">Nhập thông tin tài khoản để tiếp tục</div>

    <div class="login-error" id="login-error">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
      <span id="login-error-msg">Sai tên đăng nhập hoặc mật khẩu.</span>
    </div>

    <form id="login-form" autocomplete="on">
      <div class="field">
        <label for="username">Tên đăng nhập</label>
        <div class="input-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" autocomplete="username" required>
        </div>
      </div>

      <div class="field">
        <label for="password">Mật khẩu</label>
        <div class="input-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" autocomplete="current-password" required>
          <button type="button" class="pw-toggle" id="pw-toggle" tabindex="-1">
            <svg id="pw-eye-off" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
            <svg id="pw-eye-on" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btn-login">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
        Đăng nhập
      </button>
    </form>

    <div class="login-hint">
      <div class="hint-title">Tài khoản demo</div>
      <div class="hint-row">
        <span class="hint-badge owner">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M10 6h4"/><path d="M10 10h4"/></svg>
          Chủ Đầu Tư
        </span>
        <span class="hint-cred">admin / aurora@2025</span>
      </div>
      <div class="hint-row">
        <span class="hint-badge sales">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/></svg>
          Sales BĐS
        </span>
        <span class="hint-cred">sales / sales@2025</span>
      </div>
    </div>
  </div>

  <div class="footer">Vinhomes Hai Van Bay Admin · Chỉ dành cho nội bộ</div>
</div>

<script>
const USERS = [
  { username: 'admin',  password: 'aurora@2025', role: 'owner', name: 'Admin',       title: 'Toàn quyền' },
  { username: 'sales',  password: 'sales@2025',  role: 'sales', name: 'Sales Agent', title: 'Bất Động Sản' },
  { username: 'sales2', password: 'sales@2025',  role: 'sales', name: 'Sales 2',     title: 'Bất Động Sản' },
];

/* Password toggle */
const pwInput  = document.getElementById('password');
const pwToggle = document.getElementById('pw-toggle');
const eyeOff   = document.getElementById('pw-eye-off');
const eyeOn    = document.getElementById('pw-eye-on');
pwToggle.addEventListener('click', () => {
  const show = pwInput.type === 'password';
  pwInput.type = show ? 'text' : 'password';
  eyeOff.style.display = show ? 'none' : '';
  eyeOn.style.display  = show ? '' : 'none';
});

/* Login */
document.getElementById('login-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('login-error');
  const errMsg   = document.getElementById('login-error-msg');
  const btnEl    = document.getElementById('btn-login');

  errEl.classList.remove('show');
  btnEl.disabled = true;
  btnEl.textContent = 'Đang xác thực…';

  setTimeout(() => {
    const user = USERS.find(u => u.username === username && u.password === password);
    if (!user) {
      errMsg.textContent = 'Sai tên đăng nhập hoặc mật khẩu.';
      errEl.classList.add('show');
      btnEl.disabled = false;
      btnEl.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg> Đăng nhập`;
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
      return;
    }
    sessionStorage.setItem('ah_session', JSON.stringify({
      role: user.role, name: user.name, title: user.title, username: user.username,
      loginAt: Date.now()
    }));
    window.location.href = user.role === 'owner' ? 'owner.html' : 'sales.html';
  }, 400);
});

/* If already logged in, skip login */
(function() {
  const s = JSON.parse(sessionStorage.getItem('ah_session') || 'null');
  if (s && s.role) {
    window.location.replace(s.role === 'owner' ? 'owner.html' : 'sales.html');
  }
})();
</script>
</body>
</html>
